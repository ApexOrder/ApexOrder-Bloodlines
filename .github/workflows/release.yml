name: Build Bloodlines Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate XML and build manifest
        run: python tools/build_manifest.py

      - name: Validate release tag and version
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"

          if [[ "$TAG" != v* ]]; then
            echo "Release tag must start with v, for example v0.1.0"
            exit 1
          fi

          VERSION=$(tr -d '\r\n' < ApexOrder_Bloodlines/version.txt)
          TAG_VERSION=${TAG#v}

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ApexOrder_Bloodlines/version.txt ($VERSION) does not match release tag ($TAG)"
            echo "Update version.txt before publishing the release."
            exit 1
          fi

      - name: Build release ZIP
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          zip -r "ApexOrder-Bloodlines-${TAG}.zip" ApexOrder_Bloodlines

      - name: Attach package to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ApexOrder-Bloodlines-${{ github.event.release.tag_name }}.zip
            manifest.json
