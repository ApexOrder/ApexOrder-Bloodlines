name: Build Bloodlines Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing private release tag to rebuild, for example v0.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    env:
      PUBLIC_RELEASE_REPO: ApexOrder/Bloodlines-Releases
      PRIVATE_TAG: ${{ github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || inputs.tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || inputs.tag || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate XML and build manifest
        run: python tools/build_manifest.py

      - name: Validate release tag and version
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="$PRIVATE_TAG"

          if [[ "$TAG" != v* ]]; then
            echo "Private Bloodlines release tag must start with v, for example v0.2.4"
            exit 1
          fi

          VERSION=$(tr -d '\r\n' < ApexOrder_Bloodlines/version.txt)
          TAG_VERSION=${TAG#v}

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ApexOrder_Bloodlines/version.txt ($VERSION) does not match private release tag ($TAG)"
            echo "Update version.txt before creating the release tag."
            exit 1
          fi

          echo "MOD_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PUBLIC_TAG=bloodlines-v$VERSION" >> "$GITHUB_ENV"

      - name: Build release ZIP
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: zip -r "ApexOrder-Bloodlines-${PUBLIC_TAG}.zip" ApexOrder_Bloodlines

      - name: Attach package to private GitHub release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PRIVATE_TAG }}
          name: ApexOrder Bloodlines ${{ env.MOD_VERSION }}
          generate_release_notes: true
          files: |
            ApexOrder-Bloodlines-${{ env.PUBLIC_TAG }}.zip
            manifest.json

      - name: Publish Bloodlines package to public releases repo
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_RELEASE_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ env.PUBLIC_TAG }}
          name: ApexOrder Bloodlines ${{ env.MOD_VERSION }}
          body: |
            Public Bloodlines mod package for players.

            The launcher downloads `ApexOrder-Bloodlines-${{ env.PUBLIC_TAG }}.zip` and uses `manifest.json` for verification and repair.
          files: |
            ApexOrder-Bloodlines-${{ env.PUBLIC_TAG }}.zip
            manifest.json
