name: Build Bloodlines Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate XML and build manifest
        run: python tools/build_manifest.py

      - name: Ensure tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=$(tr -d '\r\n' < ApexOrder_Bloodlines/version.txt)
          TAG=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "version.txt ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Build release ZIP
        shell: bash
        run: zip -r "ApexOrder-Bloodlines-${{ github.ref_name }}.zip" ApexOrder_Bloodlines

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApexOrder-Bloodlines-${{ github.ref_name }}
          path: |
            ApexOrder-Bloodlines-${{ github.ref_name }}.zip
            manifest.json

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ApexOrder-Bloodlines-${{ github.ref_name }}.zip
            manifest.json
